---
- name: Déploiement stack web complète
  hosts: webservers
  become: true
  vars_files:
    - vault.yml

  roles:
    - common       # 1. Préparer le serveur
    - firewall     # 2. Sécuriser les accès
    - nginx        # 3. Installer le serveur web
    - php          # 4. Installer PHP-FPM
    - mysql        # 5. Configurer la base de données
    - app          # 6. Déployer l'application
