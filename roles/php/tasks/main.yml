---
- name: Installer PHP et extensions
  apt:
    name:
      - php{{ php_version }}-fpm
      - php{{ php_version }}-mysql
      - php{{ php_version }}-cli
      - php{{ php_version }}-curl
      - php{{ php_version }}-mbstring
      - php{{ php_version }}-xml
    state: present
    update_cache: yes

- name: Démarrer PHP-FPM
  service:
    name: php{{ php_version }}-fpm
    state: started
    enabled: yes
