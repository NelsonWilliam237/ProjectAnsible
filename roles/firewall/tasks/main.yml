---
- name: Installer UFW
  apt:
    name: ufw
    state: present

- name: Autoriser SSH
  ufw:
    rule: allow
    port: "22"

- name: Autoriser HTTP
  ufw:
    rule: allow
    port: "80"

- name: Autoriser HTTPS
  ufw:
    rule: allow
    port: "443"

- name: Autoriser MySQL depuis le subnet interne (dbservers uniquement)
  ufw:
    rule: allow
    from_ip: "10.0.2.0/24"
    port: "3306"
  when: "'dbservers' in group_names"

- name: Activer UFW
  ufw:
    state: enabled
    policy: deny
