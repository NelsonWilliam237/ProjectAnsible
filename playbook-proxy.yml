---
- name: Installer reverse proxy sur le master
  hosts: localhost
  become: true
  tasks:
    - name: Installer Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configurer le reverse proxy
      copy:
        dest: /etc/nginx/sites-available/proxy
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://10.0.2.11;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_connect_timeout 10s;
                  proxy_read_timeout 30s;
              }
          }

    - name: Activer le proxy
      file:
        src: /etc/nginx/sites-available/proxy
        dest: /etc/nginx/sites-enabled/proxy
        state: link

    - name: Supprimer site par défaut
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Démarrer Nginx
      service:
        name: nginx
        state: restarted
        enabled: yes
